version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-dashboard
    ports:
      - "8080:8080"
    environment:
      DASHBOARD_DATA_SOURCE: local
      PROCESSED_FILE: data/processed_data.csv
    command:
      - /bin/sh
      - -c
      - python src/ingestion/processing/clean_data.py && streamlit run src/dashboard/app.py --server.port=8080 --server.address=0.0.0.0
    restart: unless-stopped
